<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Events &amp; Specials — Ohana Belltown</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <p class="eyebrow">Ohana Belltown — Staff</p>
        <h1>Events &amp; Specials</h1>
        <p>
          Manage the events shown on the Local page &mdash; karaoke nights, live music,
          and anything else worth telling guests about. Requires the staff PIN to save.
        </p>
        <p class="admin-link"><a href="/menu">&larr; Back to menu</a></p>
        <div class="staff-tools-nav">
          <a href="/edit.html">Menu Editor</a>
          <a href="/loyalty-admin.html">Loyalty</a>
          <a href="/events-admin.html" class="active">Events</a>
          <a href="/table-card.html">Table Cards</a>
        </div>
      </header>

      <p id="status" class="status"></p>

      <section id="events-panel" class="panel">
        <div class="editor-toolbar">
          <h2>Events</h2>
          <div class="toolbar-actions">
            <button id="reload-btn" type="button" class="secondary">Reload latest</button>
          </div>
        </div>
        <div id="events-list"></div>
        <div class="cta-row">
          <button id="add-event-btn" type="button" class="secondary">+ Add event</button>
        </div>

        <div class="save-row">
          <button id="save-btn" type="button">Save changes</button>
          <p id="save-status" class="status"></p>
        </div>
      </section>
    </main>

    <script src="./staff-auth.js"></script>
    <script src="./events-admin.js"></script>
  </body>
</html>

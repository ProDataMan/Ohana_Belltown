<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Menu — Ohana Belltown</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <p class="eyebrow">Ohana Belltown — Staff</p>
        <h1>Edit Menu</h1>
        <p>
          Changes made here are saved directly to the live website. Make your edits,
          then click Save &mdash; no login required.
        </p>
        <p class="hint">
          This page has no password. Anyone with this link can change menu prices, so
          don't share it outside the team.
        </p>
        <p class="admin-link"><a href="./index.html">&larr; Back to menu</a></p>
      </header>

      <p id="status" class="status"></p>

      <section id="editor-panel" class="panel">
        <div class="editor-toolbar">
          <h2>Menu Items</h2>
          <div class="toolbar-actions">
            <button id="reload-btn" type="button" class="secondary">Reload latest</button>
          </div>
        </div>
        <div id="categories"></div>
        <button id="add-category-btn" type="button" class="secondary">+ Add category</button>

        <div class="save-row">
          <button id="save-btn" type="button">Save changes</button>
          <p id="save-status" class="status"></p>
        </div>
      </section>
    </main>

    <script src="./edit.js"></script>
  </body>
</html>

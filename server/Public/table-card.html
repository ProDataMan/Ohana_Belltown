<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table Card | Ohana Belltown</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="/style.css" />
    <style>
      .print-instructions {
        max-width: 720px;
        margin: 2rem auto;
        padding: 0 1.25rem;
        text-align: center;
      }

      .card-sheet {
        display: flex;
        flex-wrap: wrap;
        gap: 1.5rem;
        justify-content: center;
        padding: 0 1.25rem 3rem;
      }

      .table-card {
        width: 4in;
        height: 6in;
        background: var(--ink);
        color: #fff;
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: 1.5rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      .table-card img.logo {
        height: 56px;
        width: 56px;
        border-radius: 12px;
        background: #fff;
        object-fit: contain;
      }

      .table-card h2 {
        margin: 0;
        font-size: 1.5rem;
        text-align: center;
        background: linear-gradient(92deg, #ff8ec8, #d5bbff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .table-card img.qr {
        width: 220px;
        height: 220px;
        background: #fff;
        padding: 12px;
        border-radius: 16px;
      }

      .table-card p {
        margin: 0;
        text-align: center;
        color: #d9cce6;
        font-size: 0.85rem;
      }

      @media print {
        .site-header,
        .site-footer,
        .print-instructions {
          display: none !important;
        }

        body {
          background: #fff;
        }

        .card-sheet {
          padding: 0;
        }

        .table-card {
          box-shadow: none;
          break-inside: avoid;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a href="/" class="brand">
          <img src="/images/logo.png" alt="Ohana Belltown logo" class="brand-logo" />
          <span class="brand-name">Ohana Belltown</span>
        </a>
      </div>
    </header>

    <div class="print-instructions">
      <h1>Table Cards</h1>
      <p>Print this page (Cmd/Ctrl+P) to get table-ready cards sized for a standard 4&times;6" acrylic stand. Each card links straight to the live menu.</p>
      <button type="button" onclick="window.print()">Print This Page</button>
    </div>

    <div class="card-sheet">
      <div class="table-card">
        <img class="logo" src="/images/logo.png" alt="" />
        <h2>Scan for our Menu</h2>
        <img class="qr" src="/images/menu-qr.png" alt="QR code linking to the Ohana Belltown menu" />
        <p>Food &middot; Sushi &middot; Drinks &middot; Happy Hour</p>
      </div>
      <div class="table-card">
        <img class="logo" src="/images/logo.png" alt="" />
        <h2>Scan for our Menu</h2>
        <img class="qr" src="/images/menu-qr.png" alt="QR code linking to the Ohana Belltown menu" />
        <p>Food &middot; Sushi &middot; Drinks &middot; Happy Hour</p>
      </div>
    </div>
  </body>
</html>

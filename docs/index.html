<html>

<head>
    <meta charset="utf-8" />

        body {

        < !doctype html><html><head><meta charset="utf-8" /><title>Ohana Menu Preview</title><meta name="viewport" content="width=device-width,initial-scale=1" /><style>body {
            font-family: system-ui, Arial;
            margin: 20px
        }

        .cat {
            margin-bottom: 22px
        }

        .item {
            margin: 8px 0
        }

        .price {
            float: right;
            font-weight: 700
        }

        .yoshi {
            margin-left: 12px;
            color: #666;
            font-weight: 600
        }
    </style>
</head>

<body>
    <h1>Ohana Menu Preview</h1>
    <div id="menu">Loading…</div>
    <script>
        async function load() {
            const res = await fetch('/database/menu.json')
            const data = await res.json()
            const out = document.getElementById('menu')
            out.innerHTML = ''
                (data.categories || []).forEach(cat => {
                    const c = document.createElement('div'); c.className = 'cat'
                    const h = document.createElement('h2'); h.textContent = cat.name
                    c.appendChild(h)
                        (cat.items || []).forEach(it => {
                            const d = document.createElement('div'); d.className = 'item'
                            const n = document.createElement('span'); n.textContent = it.name || ''
                            const p = document.createElement('span'); p.className = 'price'; p.textContent = it.price == null ? '' : ('$' + Number(it.price).toFixed(2))
                            const desc = document.createElement('div'); desc.textContent = it.description || ''
                            d.appendChild(n); d.appendChild(p); d.appendChild(desc)
                            if (it.yoshi_price != null) {
                                const y = document.createElement('span'); y.className = 'yoshi'; y.textContent = '(Yoshi: $' + Number(it.yoshi_price).toFixed(2) + ')'
                                d.appendChild(y)
                            }
                            c.appendChild(d)
                        })
                    out.appendChild(c)
                })
        }
        load()
    </script>
</body>

</html>
